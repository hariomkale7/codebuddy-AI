services:
  api:
    build:
      context: ./backend/codebuddy_backend
    command: sh -c "python manage.py migrate && gunicorn codebuddy_backend.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: docker-dev-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_URL: postgresql://codebuddy:codebuddy@postgres:5432/codebuddy_ai
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codebuddy_ai
      POSTGRES_USER: codebuddy
      POSTGRES_PASSWORD: codebuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
